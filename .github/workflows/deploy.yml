name: Deploy Ren'Py Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Ren'Py Game
        id: build
        uses: ProjectAliceDev/renpy-build-action@master
        with:
          sdk-version: '8.2.3'
          project-dir: '.'
          package: 'web'

      - name: Prepare Web Root
        run: |
          mkdir -p deploy
          WEB_DIR=$(find ${{ steps.build.outputs.dir }} -maxdepth 1 -type d -name "*-web")
          cp -r $WEB_DIR/* deploy/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
