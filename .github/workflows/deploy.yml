name: Deploy Ren'Py Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download and Extract Ren'Py
        run: |
          wget https://www.renpy.org/dl/8.2.3/renpy-8.2.3-sdk.tar.bz2
          tar -xf renpy-8.2.3-sdk.tar.bz2
          wget https://www.renpy.org/dl/8.2.3/renpy-8.2.3-web.zip
          unzip -q renpy-8.2.3-web.zip -d renpy-8.2.3-sdk/

      - name: Build Web Distribution
        run: |
          cd renpy-8.2.3-sdk
          ./renpy.sh launcher web_build ../ --dest ../web-dist
          
      - name: Prepare Web Root
        run: |
          mkdir -p deploy
          cp -R web-dist/*-web/* deploy/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
